name: Pages

# Publishes the marketing landing page and privacy policy to GitHub Pages:
#   https://rafisgithub.github.io/screen-recorder/                 (landing page)
#   https://rafisgithub.github.io/screen-recorder/privacy-policy.html
# Both are used by the Microsoft Store listing (Website + Privacy policy URL).
# Only the curated files below are published — the source tree is not served.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "privacy-policy.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow one concurrent deployment; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp privacy-policy.html _site/privacy-policy.html

      # Requires a one-time repo setting: Settings > Pages > Build and
      # deployment > Source = "GitHub Actions". The built-in GITHUB_TOKEN
      # cannot create the Pages site itself, so this must be enabled once by
      # hand; after that every push here deploys automatically.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
