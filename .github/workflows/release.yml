name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v1.0.1)"
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # Set via repo secret. Generate with: firebase login:ci  (paste the token
      # as the FIREBASE_TOKEN Actions secret). If unset, the Firebase publish
      # step below is skipped and the GitHub release still succeeds.
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add -g WixToolset.UI.wixext/4.0.5

      - name: Restore
        run: dotnet restore ScreenRecorder.sln

      - name: Fetch FFmpeg native libraries
        shell: pwsh
        run: ./tools/Get-FFmpeg.ps1

      - name: Build MSI
        shell: pwsh
        run: ./installer/Build-Msi.ps1 -Version "${{ steps.version.outputs.version }}"

      # Store-submission artifact: unsigned, uploaded to Partner Center which
      # signs it. Identity overrides come from repo variables once the app
      # name is reserved (see installer/msix/README.md); the manifest
      # placeholders are used when the variables are unset.
      - name: Build MSIX
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}
          MSIX_DISPLAY_NAME: ${{ vars.MSIX_DISPLAY_NAME }}
        run: ./installer/Build-Msix.ps1 -Version "${{ steps.version.outputs.version }}" -SkipPublish

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            installer/bin/ScreenRecorderSetup-x64.msi
            installer/bin/ScreenRecorder-x64.msix
          generate_release_notes: true

      # Mirror the MSI to Firebase Hosting so the MS Store "Package URL" field
      # always has a direct, non-redirecting download link. GitHub Release asset
      # URLs 302-redirect (rejected by the Store); Firebase Hosting serves a
      # stable 200. Live URL:
      #   https://screen-recorder-e28df.web.app/<version>/ScreenRecorderSetup-x64.msi
      # NOTE: Firebase Hosting is a full-site replace, so only the newest
      # release's MSI stays live; older /<version>/ URLs 404 after the next
      # release. That's fine for the Store flow (each submission points at its
      # own version URL and Microsoft ingests it during certification).
      - name: Publish MSI to Firebase Hosting (MS Store Package URL)
        if: env.FIREBASE_TOKEN != ''
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "hosting/public/$version" | Out-Null
          Copy-Item "installer/bin/ScreenRecorderSetup-x64.msi" "hosting/public/$version/"
          Set-Location hosting
          npx -y firebase-tools@15 deploy --only hosting `
            --project screen-recorder-e28df `
            --token $env:FIREBASE_TOKEN `
            --non-interactive
          Write-Host "Package URL: https://screen-recorder-e28df.web.app/$version/ScreenRecorderSetup-x64.msi" -ForegroundColor Green
